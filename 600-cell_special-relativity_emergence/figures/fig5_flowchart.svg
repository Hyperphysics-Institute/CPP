<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="530" viewBox="0 0 720 530" font-family="Georgia, 'Times New Roman', serif">

  <defs>
    <marker id="flowArrow" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#555"/>
    </marker>
    <marker id="flowArrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#2980b9"/>
    </marker>
    <marker id="flowArrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#27ae60"/>
    </marker>
    <marker id="flowArrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#8e44ad"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="500" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">
    CPP Logical Structure: From Postulates to Relativistic Effects
  </text>
  <text x="360" y="46" text-anchor="middle" font-size="11" fill="#555" font-style="italic">
    Each arrow represents a derivation step; all paths converge on experimentally verified SR predictions.
  </text>

  <!-- ===== ROW 1: FOUR FOUNDATIONAL PRINCIPLES ===== -->
  <!-- Box 1: Minimal Entities -->
  <g transform="translate(20, 65)">
    <rect width="150" height="52" rx="7" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.8"/>
    <text x="75" y="20" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3a5c">Minimal Entities</text>
    <text x="75" y="34" text-anchor="middle" font-size="9" fill="#333">Conscious Points (CPs)</text>
    <text x="75" y="47" text-anchor="middle" font-size="9" fill="#333">±1 charge, Planck scale</text>
  </g>

  <!-- Box 2: Universal Rules -->
  <g transform="translate(190, 65)">
    <rect width="150" height="52" rx="7" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.8"/>
    <text x="75" y="20" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3a5c">Universal Rules</text>
    <text x="75" y="34" text-anchor="middle" font-size="9" fill="#333">Deterministic evolution</text>
    <text x="75" y="47" text-anchor="middle" font-size="9" fill="#333">global clock ticks</text>
  </g>

  <!-- Box 3: Perfect Conservation -->
  <g transform="translate(360, 65)">
    <rect width="150" height="52" rx="7" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.8"/>
    <text x="75" y="20" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3a5c">Perfect Conservation</text>
    <text x="75" y="34" text-anchor="middle" font-size="9" fill="#333">DI-bit conservation</text>
    <text x="75" y="47" text-anchor="middle" font-size="9" fill="#333">atemporal Nexus</text>
  </g>

  <!-- Box 4: Emergent Reality -->
  <g transform="translate(530, 65)">
    <rect width="160" height="52" rx="7" fill="#d6eaf8" stroke="#2980b9" stroke-width="1.8"/>
    <text x="80" y="20" text-anchor="middle" font-size="10" font-weight="bold" fill="#1a3a5c">Emergent Reality</text>
    <text x="80" y="34" text-anchor="middle" font-size="9" fill="#333">Spacetime &amp; physics</text>
    <text x="80" y="47" text-anchor="middle" font-size="9" fill="#333">from statistical patterns</text>
  </g>

  <!-- Arrows from row 1 to row 2 (converging) -->
  <line x1="95" y1="117" x2="250" y2="155" stroke="#2980b9" stroke-width="1.5" marker-end="url(#flowArrowBlue)"/>
  <line x1="265" y1="117" x2="290" y2="155" stroke="#2980b9" stroke-width="1.5" marker-end="url(#flowArrowBlue)"/>
  <line x1="435" y1="117" x2="390" y2="155" stroke="#2980b9" stroke-width="1.5" marker-end="url(#flowArrowBlue)"/>
  <line x1="610" y1="117" x2="440" y2="155" stroke="#2980b9" stroke-width="1.5" marker-end="url(#flowArrowBlue)"/>

  <!-- ===== ROW 2: 600-CELL LATTICE ===== -->
  <g transform="translate(200, 158)">
    <rect width="300" height="52" rx="7" fill="#d5f5e3" stroke="#27ae60" stroke-width="2"/>
    <text x="150" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a5c2a">600-Cell Quasicrystalline Lattice</text>
    <text x="150" y="35" text-anchor="middle" font-size="9.5" fill="#333">{3,3,5} polychoron · 120 vertices · H₄ symmetry</text>
    <text x="150" y="49" text-anchor="middle" font-size="9.5" fill="#333">Voronoi cells · Grid Points · Dipole Sea</text>
  </g>

  <!-- Arrow row 2 to row 3 -->
  <line x1="350" y1="210" x2="350" y2="245" stroke="#27ae60" stroke-width="1.8" marker-end="url(#flowArrowGreen)"/>

  <!-- ===== ROW 3: SSV MECHANISM ===== -->
  <g transform="translate(175, 248)">
    <rect width="350" height="60" rx="7" fill="#fef9e7" stroke="#f39c12" stroke-width="2"/>
    <text x="175" y="20" text-anchor="middle" font-size="11" font-weight="bold" fill="#7d6608">Space Stress Vector (ΔSSV) Mechanism</text>
    <text x="175" y="35" text-anchor="middle" font-size="9.5" fill="#333">Kinetic/gravitational energy → dipole separation ↑</text>
    <text x="175" y="50" text-anchor="middle" font-size="9.5" fill="#333">Voronoi cell free volume ↓ → PSR_eff = l_P/(1+k·ΔSSV)</text>
  </g>

  <!-- Arrow row 3 to row 4 (branching to three) -->
  <line x1="350" y1="308" x2="350" y2="335" stroke="#f39c12" stroke-width="1.8"/>
  <!-- branch left -->
  <line x1="350" y1="335" x2="130" y2="335" stroke="#f39c12" stroke-width="1.5"/>
  <line x1="130" y1="335" x2="130" y2="358" stroke="#f39c12" stroke-width="1.5" marker-end="url(#flowArrow)"/>
  <!-- branch center -->
  <line x1="350" y1="335" x2="350" y2="358" stroke="#f39c12" stroke-width="1.5" marker-end="url(#flowArrow)"/>
  <!-- branch right -->
  <line x1="350" y1="335" x2="570" y2="335" stroke="#f39c12" stroke-width="1.5"/>
  <line x1="570" y1="335" x2="570" y2="358" stroke="#f39c12" stroke-width="1.5" marker-end="url(#flowArrow)"/>

  <!-- ===== ROW 4: THREE EFFECTS ===== -->
  <!-- Time Dilation -->
  <g transform="translate(30, 360)">
    <rect width="200" height="68" rx="7" fill="#f9ebea" stroke="#c0392b" stroke-width="2"/>
    <text x="100" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#5c1a1a">Time Dilation</text>
    <text x="100" y="33" text-anchor="middle" font-size="9.5" fill="#333">Fewer resonant cycles per</text>
    <text x="100" y="46" text-anchor="middle" font-size="9.5" fill="#333">absolute Moment (PSR_eff↓)</text>
    <text x="100" y="61" text-anchor="middle" font-size="10" fill="#c0392b" font-style="italic">τ = t_coord / γ</text>
  </g>

  <!-- Length Contraction -->
  <g transform="translate(250, 360)">
    <rect width="200" height="68" rx="7" fill="#f9ebea" stroke="#c0392b" stroke-width="2"/>
    <text x="100" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#5c1a1a">Length Contraction</text>
    <text x="100" y="33" text-anchor="middle" font-size="9.5" fill="#333">Bulk velocity consumes</text>
    <text x="100" y="46" text-anchor="middle" font-size="9.5" fill="#333">displacement budget</text>
    <text x="100" y="61" text-anchor="middle" font-size="10" fill="#c0392b" font-style="italic">L' = L₀ / γ</text>
  </g>

  <!-- Twin Paradox -->
  <g transform="translate(470, 360)">
    <rect width="210" height="68" rx="7" fill="#f9ebea" stroke="#c0392b" stroke-width="2"/>
    <text x="105" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#5c1a1a">Twin Paradox</text>
    <text x="105" y="33" text-anchor="middle" font-size="9.5" fill="#333">Asymmetric ΔSSV along</text>
    <text x="105" y="46" text-anchor="middle" font-size="9.5" fill="#333">non-inertial worldlines</text>
    <text x="105" y="61" text-anchor="middle" font-size="10" fill="#c0392b" font-style="italic">γ = 1 + k·ΔSSV</text>
  </g>

  <!-- Arrow pointing to SR at bottom -->
  <line x1="130" y1="428" x2="290" y2="462" stroke="#8e44ad" stroke-width="1.5" marker-end="url(#flowArrowPurple)"/>
  <line x1="350" y1="428" x2="350" y2="462" stroke="#8e44ad" stroke-width="1.5" marker-end="url(#flowArrowPurple)"/>
  <line x1="575" y1="428" x2="410" y2="462" stroke="#8e44ad" stroke-width="1.5" marker-end="url(#flowArrowPurple)"/>

  <!-- ===== ROW 5: SR AGREEMENT ===== -->
  <g transform="translate(200, 465)">
    <rect width="300" height="28" rx="7" fill="#e8daef" stroke="#8e44ad" stroke-width="1.8"/>
    <text x="150" y="19" text-anchor="middle" font-size="11" font-weight="bold" fill="#4a235a">Standard SR — exact agreement at laboratory energies</text>
  </g>

  <!-- Appendix cross-references -->
  <text x="360" y="520" text-anchor="middle" font-size="9" fill="#888" font-style="italic">
    Derivation: App. A (lattice) · App. D (analytic PSR) · App. E (nonlinear) · App. A.8 (Lorentz factor) · App. B (time dilation mechanism)
  </text>
</svg>
