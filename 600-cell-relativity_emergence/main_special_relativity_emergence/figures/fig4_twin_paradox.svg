<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="470" viewBox="0 0 720 470" font-family="Georgia, 'Times New Roman', serif">

  <defs>
    <marker id="arrowUp" markerWidth="8" markerHeight="8" refX="3" refY="6" orient="auto">
      <path d="M0,6 L3,0 L6,6 z" fill="#333"/>
    </marker>
    <marker id="arrowRight" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="3" refY="6" orient="auto">
      <path d="M0,6 L3,0 L6,6 z" fill="#2980b9"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="3" refY="6" orient="auto">
      <path d="M0,6 L3,0 L6,6 z" fill="#c0392b"/>
    </marker>
    <!-- Gradient for stress shading on traveler path -->
    <linearGradient id="stressGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#e74c3c" stop-opacity="0.0"/>
      <stop offset="30%" stop-color="#e74c3c" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#e74c3c" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#e74c3c" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#e74c3c" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="440" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="360" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">
    Twin Paradox: Asymmetric ΔSSV Accumulation
  </text>
  <text x="360" y="47" text-anchor="middle" font-size="11" fill="#555" font-style="italic">
    Inertial twin (Stay) vs. accelerating twin (Travel) — stress shading ∝ ΔSSV magnitude
  </text>

  <!-- Plot area -->
  <g transform="translate(80, 65)">

    <!-- Axis -->
    <!-- t axis (vertical, absolute time) -->
    <line x1="280" y1="330" x2="280" y2="10" stroke="#333" stroke-width="1.8" marker-end="url(#arrowUp)"/>
    <!-- x axis (space) -->
    <line x1="60" y1="330" x2="540" y2="330" stroke="#333" stroke-width="1.8" marker-end="url(#arrowRight)"/>

    <!-- Axis labels -->
    <text x="280" y="8" text-anchor="middle" font-size="12" fill="#333" font-style="italic">t (absolute Moments)</text>
    <text x="548" y="334" font-size="12" fill="#333" font-style="italic">x (space)</text>

    <!-- Origin label -->
    <text x="270" y="346" font-size="11" fill="#333">O</text>
    <text x="270" y="360" font-size="10" fill="#555">Departure</text>

    <!-- ===== STAY TWIN worldline (vertical, blue) ===== -->
    <!-- From (280,330) to (280,30) — straight vertical -->
    <line x1="280" y1="330" x2="280" y2="50" stroke="#2980b9" stroke-width="3" stroke-linecap="round"/>

    <!-- Stay twin tick marks (clock ticks — evenly spaced) -->
    <g stroke="#2980b9" stroke-width="1.5">
      <line x1="274" y1="295" x2="286" y2="295"/>
      <line x1="274" y1="260" x2="286" y2="260"/>
      <line x1="274" y1="225" x2="286" y2="225"/>
      <line x1="274" y1="190" x2="286" y2="190"/>
      <line x1="274" y1="155" x2="286" y2="155"/>
      <line x1="274" y1="120" x2="286" y2="120"/>
      <line x1="274" y1="85" x2="286" y2="85"/>
      <line x1="274" y1="50" x2="286" y2="50"/>
    </g>
    <!-- Stay twin label -->
    <text x="220" y="190" text-anchor="middle" font-size="12" fill="#2980b9" font-weight="bold">Stay Twin</text>
    <text x="220" y="205" text-anchor="middle" font-size="10" fill="#2980b9">(inertial)</text>
    <text x="220" y="220" text-anchor="middle" font-size="10" fill="#2980b9">ΔSSV ≈ 0</text>

    <!-- ===== TRAVEL TWIN worldline (red, angled out and back) ===== -->
    <!-- Outbound: from (280,330) to (430,190) -->
    <!-- Turnaround: at (430,190) -->
    <!-- Return: from (430,190) to (280,50) — reunion point -->

    <!-- Stress shading rectangle alongside traveler path -->
    <!-- Outbound leg stress band -->
    <polygon points="280,330 430,190 440,185 290,325" fill="url(#stressGrad)" opacity="0.7"/>
    <!-- Return leg stress band -->
    <polygon points="430,190 280,50 270,55 420,195" fill="url(#stressGrad)" opacity="0.7"/>

    <!-- Outbound worldline -->
    <line x1="280" y1="330" x2="430" y2="190" stroke="#c0392b" stroke-width="3" stroke-linecap="round"/>
    <!-- Return worldline -->
    <line x1="430" y1="190" x2="280" y2="50" stroke="#c0392b" stroke-width="3" stroke-linecap="round"/>

    <!-- Travel twin tick marks (fewer — time dilation) -->
    <!-- Outbound: 3 ticks instead of 4 -->
    <g stroke="#c0392b" stroke-width="1.5">
      <!-- Outbound ticks (perpendicular to worldline direction ~45deg) -->
      <line x1="313" y1="297" x2="323" y2="307"/>
      <line x1="352" y1="258" x2="362" y2="268"/>
      <line x1="392" y1="218" x2="402" y2="228"/>
      <!-- Return ticks -->
      <line x1="397" y1="167" x2="407" y2="177"/>
      <line x1="358" y1="128" x2="368" y2="138"/>
      <line x1="318" y1="88" x2="328" y2="98"/>
    </g>

    <!-- Turnaround point -->
    <circle cx="430" cy="190" r="6" fill="#e74c3c" stroke="white" stroke-width="2"/>
    <text x="445" y="187" font-size="10" fill="#c0392b" font-weight="bold">Turnaround</text>
    <text x="445" y="200" font-size="10" fill="#c0392b">(acceleration peak)</text>
    <text x="445" y="213" font-size="10" fill="#c0392b">max ΔSSV</text>

    <!-- Reunion point -->
    <circle cx="280" cy="50" r="6" fill="#8e44ad" stroke="white" stroke-width="2"/>
    <text x="295" y="48" font-size="10" fill="#8e44ad" font-weight="bold">Reunion</text>

    <!-- Travel twin label -->
    <text x="480" y="270" font-size="12" fill="#c0392b" font-weight="bold">Travel Twin</text>
    <text x="480" y="285" font-size="10" fill="#c0392b">(non-inertial)</text>
    <text x="480" y="300" font-size="10" fill="#c0392b">ΔSSV &gt; 0</text>
    <text x="480" y="315" font-size="10" fill="#c0392b">during accel.</text>

    <!-- Age comparison at reunion -->
    <rect x="60" y="28" width="170" height="72" fill="white" stroke="#8e44ad" stroke-width="1.5" rx="5" opacity="0.95"/>
    <text x="145" y="46" text-anchor="middle" font-size="11" font-weight="bold" fill="#1a1a2e">Age at Reunion</text>
    <text x="75" y="64" font-size="11" fill="#2980b9">● Stay:   8 ticks</text>
    <text x="75" y="81" font-size="11" fill="#c0392b">● Travel: 6 ticks</text>
    <text x="75" y="96" font-size="10" fill="#8e44ad" font-style="italic">Fewer cycles → younger twin</text>

    <!-- ΔSSV annotation arrow -->
    <line x1="390" y1="255" x2="370" y2="240" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="408" y="255" font-size="10" fill="#e67e22">ΔSSV shading</text>
    <text x="408" y="268" font-size="10" fill="#e67e22">∝ stress level</text>

    <!-- Simultaneity line at reunion -->
    <line x1="250" y1="50" x2="280" y2="50" stroke="#8e44ad" stroke-width="1.2" stroke-dasharray="4,3"/>

    <!-- PSR reduction notation -->
    <text x="490" y="130" font-size="10" fill="#c0392b" font-style="italic">PSR_eff &lt; l_P</text>
    <text x="490" y="143" font-size="10" fill="#c0392b" font-style="italic">during travel</text>
    <text x="490" y="156" font-size="10" fill="#c0392b" font-style="italic">→ fewer cycles</text>
    <text x="490" y="169" font-size="10" fill="#c0392b" font-style="italic">per Moment</text>
  </g>

  <!-- Bottom caption -->
  <text x="360" y="455" text-anchor="middle" font-size="10" fill="#555" font-style="italic">
    Clock tick marks show proper time elapsed. Shading intensity indicates accumulated ΔSSV. The traveler ages less because PSR_eff &lt; l_P reduces cycles per Moment.
  </text>
</svg>
